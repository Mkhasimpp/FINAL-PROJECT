name: nexa_app
description: Nexa Store Ecommerce App

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # GetX
  get: ^4.6.6

  # Local Storage
  get_storage: ^2.1.1

  # HTTP API
  http: ^1.2.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1

  # Google Login
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

  # App Icon
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/gif/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"